
<style>
* { margin:0; padding:0; box-sizing:border-box; }
#app { font-family: var(--font-sans); min-height: 600px; }
.topbar {
  background: var(--color-background-primary);
  border-bottom: 0.5px solid var(--color-border-tertiary);
  padding: 0 20px; height: 50px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { font-size:16px; font-weight:500; color:var(--color-text-primary); }
.logo span { color:var(--color-text-secondary); font-weight:400; }
.main { padding: 20px; max-width: 820px; margin: 0 auto; }

.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
.card {
  background: var(--color-background-primary);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  padding: 18px;
}
.card-label {
  font-size:11px; font-weight:500; letter-spacing:0.8px;
  text-transform:uppercase; color:var(--color-text-tertiary);
  margin-bottom:12px;
}
.drop-zone {
  border: 0.5px dashed var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  padding: 24px 14px; text-align:center; cursor:pointer;
  position:relative; transition: background 0.15s;
}
.drop-zone:hover { background: var(--color-background-secondary); }
.drop-zone input { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }
.drop-icon {
  width:32px; height:32px; border-radius:var(--border-radius-md);
  background:var(--color-background-secondary);
  border:0.5px solid var(--color-border-tertiary);
  margin:0 auto 8px;
  display:flex; align-items:center; justify-content:center;
}
.drop-icon svg { width:14px; height:14px; stroke:var(--color-text-secondary); fill:none; stroke-width:1.5; }
.drop-text { font-size:13px; color:var(--color-text-secondary); line-height:1.5; }
.drop-text b { color:var(--color-text-primary); font-weight:500; }
.file-badge {
  margin-top:8px; font-size:11px; color:var(--color-text-info);
  background:var(--color-background-info);
  border-radius:var(--border-radius-md);
  padding:3px 10px; display:none;
}
textarea {
  width:100%; height:130px; resize:none;
  background:var(--color-background-secondary);
  border:0.5px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-md);
  padding:10px 12px; font-family:var(--font-sans);
  font-size:13px; color:var(--color-text-primary);
  outline:none; line-height:1.5;
}
textarea:focus { border-color:var(--color-border-primary); }
textarea::placeholder { color:var(--color-text-tertiary); }

.settings-row { display:flex; gap:10px; flex-wrap:wrap; }
.field { display:flex; flex-direction:column; gap:4px; flex:1; min-width:120px; }
.field label { font-size:11px; color:var(--color-text-secondary); }
select {
  background:var(--color-background-secondary);
  border:0.5px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-md);
  padding:7px 10px; font-size:13px;
  color:var(--color-text-primary); font-family:var(--font-sans); outline:none;
}
.btn-gen {
  width:100%; margin-top:12px; padding:13px;
  background:var(--color-text-primary); color:var(--color-background-primary);
  border:none; border-radius:var(--border-radius-md);
  font-size:14px; font-weight:500; font-family:var(--font-sans);
  cursor:pointer; transition:opacity 0.15s;
}
.btn-gen:hover { opacity:0.85; }
.btn-gen:disabled { opacity:0.35; cursor:not-allowed; }
.err {
  background:var(--color-background-danger);
  border:0.5px solid var(--color-border-danger);
  border-radius:var(--border-radius-md);
  padding:10px 14px; font-size:13px;
  color:var(--color-text-danger); margin-top:10px; display:none;
}

/* LOADING */
#s-loading { display:none; text-align:center; padding:80px 20px; }
.spinner {
  width:40px; height:40px; border-radius:50%;
  border:2px solid var(--color-border-tertiary);
  border-top-color:var(--color-text-primary);
  animation:spin 0.8s linear infinite; margin:0 auto 16px;
}
@keyframes spin { to { transform:rotate(360deg); } }
.load-msg { font-size:14px; color:var(--color-text-secondary); }

/* RESULTS */
#s-results { display:none; }
.res-header {
  display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;
}
.res-title { font-size:16px; font-weight:500; }
.btn-back {
  font-size:12px; color:var(--color-text-secondary);
  background:none; border:0.5px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-md);
  padding:5px 12px; cursor:pointer; font-family:var(--font-sans);
}
.btn-back:hover { border-color:var(--color-border-primary); color:var(--color-text-primary); }
.tabs {
  display:flex; gap:3px;
  background:var(--color-background-secondary);
  border-radius:var(--border-radius-md);
  padding:3px; width:fit-content; margin-bottom:14px;
}
.tbtn {
  font-size:13px; font-weight:500; padding:5px 16px;
  border-radius:7px; border:none; background:none;
  cursor:pointer; font-family:var(--font-sans);
  color:var(--color-text-secondary); transition:all 0.15s;
}
.tbtn.on {
  background:var(--color-background-primary);
  color:var(--color-text-primary);
  border:0.5px solid var(--color-border-tertiary);
}

/* QCM */
.score-bar {
  background:var(--color-background-success);
  border:0.5px solid var(--color-border-success);
  border-radius:var(--border-radius-md);
  padding:10px 14px; font-size:13px;
  color:var(--color-text-success); margin-bottom:12px; display:none;
}
.qcard {
  background:var(--color-background-primary);
  border:0.5px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-lg);
  padding:20px; margin-bottom:10px;
}
.qnum { font-size:11px; color:var(--color-text-tertiary); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:6px; }
.qtext { font-size:14px; font-weight:500; margin-bottom:14px; line-height:1.5; }
.opt {
  display:flex; align-items:flex-start; gap:9px;
  padding:9px 11px; border-radius:var(--border-radius-md);
  border:0.5px solid var(--color-border-tertiary);
  margin-bottom:7px; cursor:pointer; font-size:13px;
  transition:all 0.12s; color:var(--color-text-primary);
}
.opt:hover:not(.locked) { background:var(--color-background-secondary); border-color:var(--color-border-secondary); }
.opt.wrong { background:var(--color-background-danger); border-color:var(--color-border-danger); color:var(--color-text-danger); }
.opt.good { background:var(--color-background-success); border-color:var(--color-border-success); color:var(--color-text-success); }
.oletter {
  width:20px; height:20px; min-width:20px;
  border-radius:50%; border:0.5px solid var(--color-border-secondary);
  display:flex; align-items:center; justify-content:center;
  font-size:10px; font-weight:500;
}
.expl { font-size:12px; color:var(--color-text-secondary); margin-top:10px; padding-top:10px; border-top:0.5px solid var(--color-border-tertiary); display:none; line-height:1.5; }

/* FLASH */
#t-flash { display:none; }
.fnav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.fcnt { font-size:13px; color:var(--color-text-secondary); }
.farrows { display:flex; gap:6px; }
.farr {
  width:30px; height:30px;
  border:0.5px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-md);
  background:none; cursor:pointer; font-size:13px;
  color:var(--color-text-secondary);
  display:flex; align-items:center; justify-content:center;
  transition:border-color 0.15s;
}
.farr:hover:not(:disabled) { border-color:var(--color-border-primary); color:var(--color-text-primary); }
.farr:disabled { opacity:0.3; cursor:not-allowed; }
.fcard {
  background:var(--color-background-primary);
  border:0.5px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-lg);
  padding:36px 24px; text-align:center; cursor:pointer;
  min-height:180px; display:flex; flex-direction:column;
  align-items:center; justify-content:center; position:relative;
  transition:border-color 0.15s;
}
.fcard:hover { border-color:var(--color-border-secondary); }
.fside { position:absolute; top:12px; left:14px; font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--color-text-tertiary); }
.ffront { font-size:15px; font-weight:500; line-height:1.5; }
.fhint { font-size:12px; color:var(--color-text-tertiary); margin-top:12px; }
.fback { font-size:13px; color:var(--color-text-secondary); margin-top:14px; line-height:1.6; border-top:0.5px solid var(--color-border-tertiary); padding-top:14px; display:none; }

@media(max-width:540px){
  .grid2 { grid-template-columns:1fr; }
  .settings-row { flex-direction:column; }
}
</style>

<div id="app">
  <div class="topbar">
    <div class="logo">MEDX <span>— Study AI</span></div>
    <div style="font-size:11px;color:var(--color-text-tertiary);">Faculté de Médecine</div>
  </div>
  <div class="main">

    <!-- INPUT -->
    <div id="s-input">
      <div class="grid2">
        <div class="card">
          <div class="card-label">PDF de cours</div>
          <div class="drop-zone" id="dz">
            <input type="file" accept=".pdf" id="pdffile" />
            <div class="drop-icon">
              <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <div class="drop-text"><b>Choisir un PDF</b><br>ou glisser ici</div>
            <div class="file-badge" id="fbadge"></div>
          </div>
        </div>
        <div class="card">
          <div class="card-label">Ou coller le texte</div>
          <textarea id="txtin" placeholder="Colle ton cours ici…&#10;&#10;Ex: La mitose est le processus de division cellulaire comprenant 4 phases : prophase, métaphase, anaphase et télophase…"></textarea>
        </div>
      </div>
      <div class="card">
        <div class="settings-row">
          <div class="field">
            <label>Nombre de QCM</label>
            <select id="nbq">
              <option value="5">5 questions</option>
              <option value="10" selected>10 questions</option>
              <option value="15">15 questions</option>
            </select>
          </div>
          <div class="field">
            <label>Flashcards</label>
            <select id="nbf">
              <option value="5">5 flashcards</option>
              <option value="10" selected>10 flashcards</option>
              <option value="15">15 flashcards</option>
            </select>
          </div>
          <div class="field">
            <label>Langue</label>
            <select id="lng">
              <option value="français">Français</option>
              <option value="arabe">Arabe</option>
              <option value="anglais">Anglais</option>
            </select>
          </div>
        </div>
      </div>
      <div class="err" id="errmsg"></div>
      <button class="btn-gen" id="btngen">Générer QCM + Flashcards</button>
    </div>

    <!-- LOADING -->
    <div id="s-loading">
      <div class="spinner"></div>
      <div class="load-msg" id="loadmsg">Lecture du cours…</div>
    </div>

    <!-- RESULTS -->
    <div id="s-results">
      <div class="res-header">
        <div class="res-title" id="restitle"></div>
        <button class="btn-back" id="btnback">← Nouveau cours</button>
      </div>
      <div class="score-bar" id="scorebar"></div>
      <div class="tabs">
        <button class="tbtn on" id="tqbtn">QCM</button>
        <button class="tbtn" id="tfbtn">Flashcards</button>
      </div>

      <div id="t-qcm">
        <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:12px;" id="qprog"></div>
        <div id="qcont"></div>
      </div>

      <div id="t-flash">
        <div class="fnav">
          <div class="fcnt" id="fcnt">1 / 10</div>
          <div class="farrows">
            <button class="farr" id="fprev">←</button>
            <button class="farr" id="fnext">→</button>
          </div>
        </div>
        <div class="fcard" id="fcard">
          <div class="fside" id="fside">Question</div>
          <div class="ffront" id="ffront"></div>
          <div class="fhint" id="fhint">Cliquer pour révéler</div>
          <div class="fback" id="fback"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
const G = id => document.getElementById(id);
let pdfTxt='', qcm=[], flash=[], fi=0, fo=false, ans=0, cor=0;

// PDF read
G('pdffile').onchange = e => {
  const f = e.target.files[0]; if(!f) return;
  G('fbadge').textContent = f.name;
  G('fbadge').style.display = 'inline-block';
  const r = new FileReader();
  r.onload = ev => {
    const b = ev.target.result;
    let t = '';
    const m = b.match(/\(([^\)]{4,300})\)/g)||[];
    m.forEach(x=>{ const s=x.slice(1,-1).replace(/\\/g,''); if(/[a-zA-ZÀ-ÿ]{4,}/.test(s)) t+=s+' '; });
    pdfTxt = t.length>80 ? t : `[PDF: ${f.name}]`;
  };
  r.readAsBinaryString(f);
};

// drag
const dz=G('dz');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.style.background='var(--color-background-secondary)';});
dz.addEventListener('dragleave',()=>dz.style.background='');
dz.addEventListener('drop',e=>{e.preventDefault();dz.style.background='';});

G('btngen').onclick = generate;

async function generate() {
  const txt = G('txtin').value.trim();
  const src = txt || pdfTxt;
  const err = G('errmsg');
  err.style.display='none';
  if(!src || src.length < 40) {
    err.textContent='Colle ton cours dans le champ texte (minimum 40 caractères).';
    err.style.display='block'; return;
  }
  const nbq=G('nbq').value, nbf=G('nbf').value, lng=G('lng').value;
  show('loading');
  const msgs=['Lecture du cours…','Analyse des concepts clés…','Génération des QCM…','Création des Flashcards…'];
  let mi=0;
  const t=setInterval(()=>{ G('loadmsg').textContent=msgs[++mi%msgs.length]; },1600);

  const prompt = `Tu es un expert en pédagogie médicale. Génère exactement ${nbq} QCM et ${nbf} flashcards en ${lng} à partir de ce cours.

Cours:
"""
${src.slice(0,4000)}
"""

Réponds UNIQUEMENT avec du JSON valide, sans markdown, sans texte avant ou après:
{"qcm":[{"question":"...","options":["A. ...","B. ...","C. ...","D. ..."],"correct":0,"explanation":"..."}],"flashcards":[{"front":"...","back":"..."}]}

Règles: correct = index 0-3 de la bonne réponse. Distracteurs réalistes. Flashcards concises.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:4000,
        messages:[{role:'user',content:prompt}]
      })
    });
    clearInterval(t);
    const d = await res.json();
    if(d.error) throw new Error(d.error.message||'API error');
    const raw = (d.content||[]).find(b=>b.type==='text')?.text||'';
    const jm = raw.match(/\{[\s\S]*\}/);
    if(!jm) throw new Error('JSON introuvable');
    const p = JSON.parse(jm[0]);
    qcm = p.qcm||[]; flash = p.flashcards||[];
    if(!qcm.length && !flash.length) throw new Error('Aucun contenu généré');
    ans=0; cor=0; fi=0; fo=false;
    render();
    show('results');
  } catch(e) {
    clearInterval(t);
    show('input');
    err.textContent='Erreur: '+e.message+'. Réessaie.';
    err.style.display='block';
  }
}

function show(s){
  G('s-input').style.display=s==='input'?'block':'none';
  G('s-loading').style.display=s==='loading'?'block':'none';
  G('s-results').style.display=s==='results'?'block':'none';
}

function render(){
  G('restitle').textContent=`${qcm.length} QCM · ${flash.length} Flashcards`;
  G('qprog').textContent=`0 / ${qcm.length} répondues`;
  G('scorebar').style.display='none';
  const c=G('qcont'); c.innerHTML='';
  qcm.forEach((q,qi)=>{
    const d=document.createElement('div'); d.className='qcard';
    d.innerHTML=`<div class="qnum">Question ${qi+1}</div>
<div class="qtext">${q.question}</div>
<div id="opts${qi}">${q.options.map((o,oi)=>`<div class="opt" data-qi="${qi}" data-oi="${oi}"><span class="oletter">${'ABCD'[oi]}</span><span>${o.replace(/^[A-D]\.\s*/,'')}</span></div>`).join('')}</div>
<div class="expl" id="ex${qi}">${q.explanation||''}</div>`;
    c.appendChild(d);
  });
  c.querySelectorAll('.opt').forEach(o=>o.addEventListener('click',()=>pick(o)));
  renderFlash();
}

function pick(o){
  const qi=+o.dataset.qi, oi=+o.dataset.oi;
  const opts=G('qcont').querySelectorAll(`[data-qi="${qi}"]`);
  if(opts[0].classList.contains('locked')) return;
  const ok = oi===qcm[qi].correct;
  if(ok) { o.classList.add('good'); cor++; }
  else { o.classList.add('wrong'); opts[qcm[qi].correct].classList.add('good'); }
  opts.forEach(x=>x.classList.add('locked'));
  G('ex'+qi).style.display='block';
  ans++;
  G('qprog').textContent=`${ans} / ${qcm.length} répondues`;
  if(ans===qcm.length){
    const b=G('scorebar');
    b.textContent=`Score : ${cor} / ${qcm.length} (${Math.round(cor/qcm.length*100)}%)`;
    b.style.display='block';
  }
}

function renderFlash(){
  if(!flash.length) return;
  fo=false;
  const f=flash[fi];
  G('fcnt').textContent=`${fi+1} / ${flash.length}`;
  G('ffront').textContent=f.front;
  G('fback').textContent=f.back;
  G('fback').style.display='none';
  G('fhint').style.display='block';
  G('fside').textContent='Question';
  G('fprev').disabled=fi===0;
  G('fnext').disabled=fi===flash.length-1;
}

G('fcard').onclick=()=>{
  fo=!fo;
  G('fback').style.display=fo?'block':'none';
  G('fhint').style.display=fo?'none':'block';
  G('fside').textContent=fo?'Réponse':'Question';
};
G('fprev').onclick=()=>{ if(fi>0){fi--;renderFlash();} };
G('fnext').onclick=()=>{ if(fi<flash.length-1){fi++;renderFlash();} };

G('tqbtn').onclick=()=>{
  G('t-qcm').style.display='block'; G('t-flash').style.display='none';
  G('tqbtn').classList.add('on'); G('tfbtn').classList.remove('on');
};
G('tfbtn').onclick=()=>{
  G('t-flash').style.display='block'; G('t-qcm').style.display='none';
  G('tfbtn').classList.add('on'); G('tqbtn').classList.remove('on');
};
G('btnback').onclick=()=>{ G('txtin').value=''; pdfTxt=''; G('fbadge').style.display='none'; G('errmsg').style.display='none'; show('input'); };
</script>
